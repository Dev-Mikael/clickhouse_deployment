apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/clickhouse
  prune: true
  wait: true
  timeout: 10m0s
