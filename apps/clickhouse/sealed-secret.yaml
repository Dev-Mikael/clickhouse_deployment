# ============================================================
# IMPORTANT: THIS IS A PLACEHOLDER — DO NOT COMMIT AS-IS
# ============================================================
# You must generate the real SealedSecret before pushing.
# Follow these steps EXACTLY:
#
# 1. Make sure sealed-secrets controller is running:
#    kubectl get pods -n sealed-secrets
#
# 2. Generate and seal the secret (replace MY_SECURE_PASSWORD):
#
#    kubectl create secret generic clickhouse-credentials \
#      --from-literal=admin-password=MY_SECURE_PASSWORD \
#      --namespace=clickhouse \
#      --dry-run=client -o yaml \
#    | kubeseal \
#        --controller-namespace=sealed-secrets \
#        --controller-name=sealed-secrets-controller \
#        --format=yaml \
#    > apps/clickhouse/sealed-secret.yaml
#
# 3. Verify the file was updated (it should have a long encryptedData block).
# 4. git add apps/clickhouse/sealed-secret.yaml && git commit && git push
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: clickhouse-credentials
  namespace: clickhouse
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    # Replace this entire value with the output from the kubeseal command above
    admin-password: REPLACE_WITH_SEALED_VALUE_FROM_KUBESEAL
  template:
    metadata:
      name: clickhouse-credentials
      namespace: clickhouse
    type: Opaque
