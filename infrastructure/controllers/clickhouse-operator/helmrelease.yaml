apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse-operator
  namespace: clickhouse-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: clickhouse-operator
      version: "0.23.*"
      sourceRef:
        kind: HelmRepository
        name: altinity
        namespace: flux-system
      interval: 12h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    operator:
      # Watch all namespaces for ClickHouseInstallation CRs
      watchNamespaces: []
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    metrics:
      enabled: false
